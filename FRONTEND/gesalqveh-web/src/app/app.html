<mat-toolbar color="primary">
  <span class="brand">
    <mat-icon>directions_car</mat-icon>
    GESALQVEH
  </span>
  <a mat-button routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Inicio</a>
  <a mat-button routerLink="/vehiculos" routerLinkActive="active">Vehículos</a>
  <a mat-button routerLink="/alquileres" routerLinkActive="active">Alquileres</a>
  <span class="spacer"></span>
  @if (auth.authenticated()) {
    <a mat-button routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
    <button mat-button (click)="logout()">
      <mat-icon>logout</mat-icon>
      Salir
    </button>
  } @else {
    <a mat-button routerLink="/login">
      <mat-icon>login</mat-icon>
      Admin
    </a>
  }
</mat-toolbar>

<main class="container">
  <router-outlet />
</main>
