server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost"
              - "http://localhost:*"
              - "http://127.0.0.1:*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      discovery:
        locator:
          enabled: false
      routes:
        - id: buscador
          uri: lb://buscador
          predicates:
            - Path=/api/buscador/**
          filters:
            - StripPrefix=2
        - id: operador
          uri: lb://operador
          predicates:
            - Path=/api/operador/**
          filters:
            - StripPrefix=2
        - id: dashboard
          uri: lb://dashboard
          predicates:
            - Path=/api/dashboard/**
          filters:
            - StripPrefix=2

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
